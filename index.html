<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>fritanga</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;1,300&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    color: #e8e4dc;
    padding: 2rem;
  }

  #search-wrap {
    width: 100%;
    max-width: 520px;
    position: relative;
  }

  #input-line {
    position: relative;
    border-bottom: 1px solid #333;
    display: flex;
    align-items: center;
  }

  #search-input {
    width: 100%;
    background: transparent;
    border: none;
    color: #e8e4dc;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 22px;
    font-weight: 300;
    padding: 0 0 10px 0;
    outline: none;
    caret-color: transparent;
    letter-spacing: 0.04em;
  }

  #cursor {
    position: absolute;
    left: 0;
    bottom: 10px;
    width: 2px;
    height: 22px;
    background: #e8e4dc;
    animation: blink 1s step-end infinite;
    pointer-events: none;
    transition: left 0.05s;
  }

  #cursor.hidden { display: none; }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  #status {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: #444;
    margin-top: 14px;
    text-transform: uppercase;
    min-height: 14px;
  }

  #result-wrap {
    width: 100%;
    max-width: 520px;
    margin-top: 3rem;
    display: none;
  }

  #essay {
    font-size: 15px;
    font-weight: 300;
    line-height: 2;
    color: #c8c4bc;
    font-style: italic;
    letter-spacing: 0.01em;
  }

  .verse-line {
    display: inline;
    position: relative;
    cursor: default;
  }

  .verse-line::after {
    content: '. ';
    color: #555;
    font-style: normal;
  }

  .verse-line:hover { color: #e8e4dc; }

  .verse-line .tooltip {
    display: none;
    position: fixed;
    background: #111;
    border: 1px solid #2a2a2a;
    color: #888;
    font-size: 10px;
    font-style: normal;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 5px 10px;
    pointer-events: none;
    white-space: nowrap;
    z-index: 100;
  }

  .verse-line:hover .tooltip { display: block; }

  #no-result {
    display: none;
    font-size: 11px;
    letter-spacing: 0.25em;
    color: #333;
    text-transform: uppercase;
  }

  .loading-dot {
    display: inline-block;
    animation: blink 1s infinite;
  }
</style>
</head>
<body>

<div id="search-wrap">
  <div id="input-line">
    <input
      type="text"
      id="search-input"
      autocomplete="off"
      spellcheck="false"
    />
    <div id="cursor"></div>
  </div>
  <div id="status"></div>
</div>

<div id="result-wrap">
  <div id="essay"></div>
  <div id="no-result">sin resultados</div>
</div>

<script>
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS2E_9vH77H-U5nURPY4SrmgewgPb8rpXgXv2cIeJ9ZuZVAIHqBWGWc5ClRDGPgIRyCDSaL4GQmC-91/pub?gid=1890510071&single=true&output=csv';

let db = [];

async function loadSheet() {
  const status = document.getElementById('status');
  status.innerHTML = 'cargando<span class="loading-dot">_</span>';
  try {
    const url = SHEET_URL;
    const res = await fetch(url);
    const text = await res.text();
    const rows = parseCSV(text);
    db = rows.slice(1).filter(r => r[1] && r[1].trim()).map(r => ({
      song_id: (r[0] || '').trim(),
      line: (r[1] || '').trim(),
      line_number: (r[2] || '').trim()
    }));
    status.textContent = '';
  } catch(e) {
    status.textContent = 'error · revisa el sheet id';
  }
}

function parseCSV(text) {
  const rows = [];
  let row = [], field = '', inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQ) {
      if (c === '"' && text[i+1] === '"') { field += '"'; i++; }
      else if (c === '"') inQ = false;
      else field += c;
    } else {
      if (c === '"') inQ = true;
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
      else if (c === '\r') {}
      else field += c;
    }
  }
  if (field || row.length) { row.push(field); rows.push(row); }
  return rows;
}

function formatSongId(id) {
  return id.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function updateCursor() {
  const input = document.getElementById('search-input');
  const cursor = document.getElementById('cursor');
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  ctx.font = '300 22px IBM Plex Mono, monospace';
  const textBefore = input.value.substring(0, input.selectionStart);
  const w = ctx.measureText(textBefore).width;
  cursor.style.left = Math.round(w) + 'px';
}

function search(word) {
  const q = word.toLowerCase().trim();
  const essay = document.getElementById('essay');
  const noResult = document.getElementById('no-result');
  const wrap = document.getElementById('result-wrap');

  if (!q || q.length < 2) {
    wrap.style.display = 'none';
    return;
  }

  const matches = db.filter(r => r.line.toLowerCase().includes(q));
  wrap.style.display = 'block';

  if (matches.length === 0) {
    essay.innerHTML = '';
    noResult.style.display = 'block';
    return;
  }

  noResult.style.display = 'none';
  essay.innerHTML = matches.map(r => {
    const label = formatSongId(r.song_id);
    return `<span class="verse-line" data-song="${label}">${escapeHtml(r.line)}<span class="tooltip">${escapeHtml(label)}</span></span>`;
  }).join(' ');

  document.querySelectorAll('.verse-line').forEach(el => {
    el.addEventListener('mousemove', e => {
      const tip = el.querySelector('.tooltip');
      tip.style.left = (e.clientX + 14) + 'px';
      tip.style.top = (e.clientY - 28) + 'px';
    });
  });
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

const input = document.getElementById('search-input');
let debounceTimer;

input.addEventListener('input', e => {
  updateCursor();
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => search(e.target.value), 120);
});

input.addEventListener('keyup', updateCursor);
input.addEventListener('click', updateCursor);
input.addEventListener('focus', updateCursor);

input.focus();
loadSheet();
</script>
</body>
</html>
